<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestLens Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; color: white; border-radius: 12px; }
        .btn-primary { background-color: #3b82f6; border: none; }
        .text-success { color: #10b981 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🔭 InvestLens Pro</span>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card p-4 shadow">
                    <h5 class="mb-3">Buscar Ativo</h5>
                    <form action="/" method="get">
                        <div class="mb-3">
                            <label class="form-label">Ticker (B3)</label>
                            <input type="text" name="ticker" class="form-control bg-dark text-white border-secondary" value="{{ ticker }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ano Base</label>
                            <input type="number" name="ano" class="form-control bg-dark text-white border-secondary" value="{{ ano }}">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Analisar Dados</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4 shadow text-center">
                    <h3>{{ ticker }}</h3>
                    <h1 class="display-2 text-success font-monospace">R$ {{ preco_atual }}</h1>
                    <p class="text-secondary">Cotação do último fechamento</p>
                    <hr class="border-secondary">
                    <div class="table-responsive mt-4">
                        <table class="table table-dark table-hover text-start">
                            <thead>
                                <tr><th>Data</th><th>Fechamento</th><th>Volume</th></tr>
                            </thead>
                            <tbody>
                                {% for linha in registos %}
                                <tr>
                                    <td>{{ linha.Date }}</td>
                                    <td>R$ {{ "%.2f"|format(linha.Close) }}</td>
                                    <td>{{ "{:,}".format(linha.Volume) }}</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
